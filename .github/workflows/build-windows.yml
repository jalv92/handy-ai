name: Build Windows

# Builds the Windows installer (.msi + NSIS .exe) on GitHub's Windows runners.
# Run it manually from the Actions tab ("Run workflow"), or it runs on version tags.
# No local Windows toolchain needed — the runner has MSVC, WebView2, and cmake.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      # whisper-rs-sys uses bindgen, which needs libclang. windows-latest ships LLVM here.
      LIBCLANG_PATH: "C:\\Program Files\\LLVM\\bin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app (Windows installers)
        run: bun run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: handy-windows-installers
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/handy.exe
