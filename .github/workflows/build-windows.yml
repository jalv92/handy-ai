name: Build Windows

# Builds the Windows installer (.msi + NSIS .exe) on GitHub's Windows runners.
# Run it manually from the Actions tab ("Run workflow"), or it runs on version tags.
# No local Windows toolchain needed — the runner has MSVC, WebView2, and cmake.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    env:
      # whisper-rs-sys uses bindgen, which needs libclang. windows-latest ships LLVM here.
      LIBCLANG_PATH: "C:\\Program Files\\LLVM\\bin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app (Windows installers)
        run: bun run tauri build

      - name: Upload installers (run artifact)
        uses: actions/upload-artifact@v4
        with:
          name: handy-windows-installers
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/handy.exe

      - name: Attach installers to the GitHub Release (on version tag)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) { gh release create $tag --title $tag --notes "Automated Windows build for $tag." }
          gh release upload $tag $msi.FullName $exe.FullName --clobber
